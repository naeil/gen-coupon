spring:
  application:
    name: gen-coupon
  datasource:
    url: jdbc:mariadb://localhost:3306/gen-coupon
    driver-class-name: org.mariadb.jdbc.Driver
    username: root
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    messages:
      basename: messages
      encoding: utf-8
      cache-duration: 3
server:
  port: 8081
  servlet:
    context-path: "/naeil"
