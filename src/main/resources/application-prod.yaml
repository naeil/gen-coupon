logging:
  level:
    org.hibernate.engine.jdbc.env.internal.JdbcEnvironmentInitiator: WARN

spring:
  messages:
    basename: messages
    encoding: utf-8
    cache-duration: 3
  config:
    activate:
      on-profile: prod
  application:
    name: gen-coupon
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: false
server:
  port: 8081
  servlet:
    context-path: "/naeil"

imweb:
  key: ${IMWEB_KEY}
  secret: ${IMWEB_SECRET}

playauto:
  email: ${PLAYAUTO_EMAIL}
  password: ${PLAYAUTO_PASSWD}
  api-key: ${PLAYAUTO_API_KEY}

aligo:
  api-key: ${ALIGO_API_KEY}
  user-id: ${ALIGO_USER_ID}
  sender-key: ${ALIGO_SENDER_KEY}
  template-code: ${ALIGO_TEMPLATE_CODE}
  sender: "${ALIGO_SENDER}"

crypto:
  secret_key: ${CRYPTO_SECRET_KEY}