<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="common-head(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">Coupon Admin</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .sidebar {
            min-height: 100vh;
            background-color: #343a40;
        }
        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
        }
        .sidebar a.active,
        .sidebar a:hover {
            color: #ffffff;
            background-color: #495057;
        }
        .content {
            padding: 20px;
        }
        .modal-fullscreen-custom {
            max-width: 90vw;
        }
        .modal-half-screen-custom {
            max-width: 70vw;
        }
        @media (min-width: 768px) {
          .col-md-1-5 {
            flex: 0 0 auto;
            width: 12.5%;
          }
          .col-md-10-5 {
            flex: 0 0 auto;
            width: 87.5%;
          }
        }
    </style>
</head>
</html>
