<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: common-head('발급 쿠폰')}"></head>

<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar('coupons')}"></div>

        <!-- 🔹 Main Content -->
        <main class="col-md-10 content">

            <!-- Header -->
            <div class="mb-4">
                <h3>발급 쿠폰</h3>
                <p class="text-muted mb-0">
                    사용자에게 발급된 쿠폰과 사용된 주문 정보를 조회합니다.
                </p>
            </div>

            <!-- 🔹 Filter -->
            <form class="card shadow-sm mb-4 p-3"
                  th:action="@{/coupons}" method="get">

                <div class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">사용자</label>
                        <select class="form-select" name="userId">
                            <option value="">전체</option>
                            <option th:each="user : ${users}"
                                    th:value="${user.id}"
                                    th:text="${user.email}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">시작일</label>
                        <input type="date" class="form-control" name="fromDate">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">종료일</label>
                        <input type="date" class="form-control" name="toDate">
                    </div>

                    <div class="col-md-3">
                        <button type="submit" class="btn btn-primary w-100">
                            조회
                        </button>
                    </div>
                </div>
            </form>

            <!-- 🔹 Coupon Table -->
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>쿠폰 코드</th>
                            <th>쿠폰명</th>
                            <th>사용자</th>
                            <th>발급일</th>
                            <th>상태</th>
                            <th class="text-center">주문</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="coupon : ${coupons}">
                            <td th:text="${coupon.couponCode}">WELCOME10</td>
                            <td th:text="${coupon.couponName}">웰컴 쿠폰</td>
                            <td th:text="${coupon.userEmail}">user@email.com</td>
                            <td th:text="${coupon.issuedAt}">2025-01-10</td>
                            <td>
                                <span class="badge badge-status"
                                      th:text="${coupon.used ? '사용' : '미사용'}"
                                      th:classappend="${coupon.used} ? 'bg-success' : 'bg-secondary'">
                                </span>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-outline-primary"
                                        data-bs-toggle="modal"
                                        data-bs-target="#usedOrderModal"
                                        th:attr="data-coupon-id=${coupon.id}">
                                    보기
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- 🔹 Used Orders Modal -->
<div class="modal fade" id="usedOrderModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">쿠폰 발급 시 사용된 주문</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <table class="table table-sm">
                    <thead>
                    <tr>
                        <th>주문번호</th>
                        <th>주문금액</th>
                        <th>주문일</th>
                        <th>스탬프 ID</th>
                    </tr>
                    </thead>
                    <tbody>
                    <!-- Thymeleaf fragment or AJAX -->
                    <tr>
                        <td>ORD-001</td>
                        <td>50,000</td>
                        <td>2025-01-01</td>
                        <td>STAMP-001</td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
