<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: common-head('발급 쿠폰')}"></head>

<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar('coupons')}"></div>

        <!-- 🔹 Main Content -->
        <main class="col-md-10-5 content">

            <!-- Header -->
            <div class="mb-4">
                <h3>발급 쿠폰</h3>
                <p class="text-muted mb-0">
                    주문자에게 발급된 쿠폰과 사용된 주문 정보를 조회합니다.
                </p>
            </div>

            <!-- 🔹 Filter -->
            <form class="card shadow-sm mb-4 p-3"
                  th:action="@{/coupons}" method="get"
                  onsubmit="return validateDateRange();">

                <div class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label fw-bold">주문자명</label>
                        <input type="text" class="form-control" name="customerName">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-bold">발급일(시작 ~ 종료)</label>
                        <input type="date" class="form-control" name="fromDate" id="fromDate">
                    </div>

                    <div class="col-md-3">
                        <!-- <label class="form-label">종료일</label> -->
                        <input type="date" class="form-control" name="toDate" id="toDate">
                    </div>

                    <div class="col-md-3">
                        <button type="submit" class="btn btn-primary w-100">
                            조회
                        </button>
                    </div>
                </div>
            </form>

            <!-- 🔹 Coupon Table -->
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover text-center mb-0" id="couponTable">
                        <thead class="table-light">
                            <tr>
                                <th>쿠폰 코드</th>
                                <th>쿠폰명</th>
                                <th>주문자명</th>
                                <th>발급일</th>
                                <th>발송 결과</th>
                                <th class="text-center">주문</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="coupon, stat : ${coupons}"
                                th:attr="data-index=${stat.index}">
                                <td th:text="${coupon.issuedCouponCode}">WELCOME10</td>
                                <td th:text="${coupon.imwebCouponName}">웰컴 쿠폰</td>
                                <td th:text="${coupon.customerName}">user</td>
                                <td th:text="${coupon.createDate == null ? '-' : #temporals.format(coupon.createDate, 'yyyy-MM-dd HH:mm')}"></td>
                                <td th:text="${coupon.rslt}">user</td>
                                <td class="text-center">
                                    <button class="btn btn-sm btn-outline-primary"
                                            data-bs-toggle="modal"
                                            data-bs-target="#orderModal"
                                            th:attr="data-coupon-id=${coupon.issueId}">
                                        보기
                                    </button>
                                </td>
                            </tr>
                            <!-- 데이터 없을 때 -->
                            <tr th:if="${coupons == null or #lists.isEmpty(coupons)}">
                                <td colspan="6" class="text-center text-muted py-4">
                                    조회된 데이터가 없습니다.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    </div>
                    <div class="d-flex justify-content-center p-3 border-top">
                        <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- 🔹 Used Orders Modal -->
<div class="modal fade" id="orderModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable modal-fullscreen-custom">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">쿠폰 발급 시 사용된 주문 목록</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <div class="table-responsive">
                    <table class="table table-sm text-center mb-0" id="orderTable">
                    <thead class="table-light">
                        <tr class="text-secondary small text-uppercase">
                            <th class="text-nowrap ps-3" style="min-width: 140px;">주문번호</th>
                            <th class="text-nowrap" style="min-width: 90px;">주문자</th>
                            <th class="text-nowrap" style="min-width: 300px;">상품명</th>
                            <th class="text-nowrap" style="min-width: 100px;">주문금액</th>
                            <th class="text-nowrap" style="min-width: 110px;">주문일</th>
                            <th class="text-nowrap" style="min-width: 110px;">구매 결정일</th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody">
                        <!-- Thymeleaf fragment or AJAX -->
                    </tbody>
                </table>
                </div>
                <div class="d-flex justify-content-center p-3 border-top">
                    <ul class="pagination pagination-sm mb-0" id="orderPagination"></ul>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const rows = document.querySelectorAll('#couponTable tbody tr[data-index]');
        const rowsPerPage = 20;
        const totalRows = rows.length;
        const totalPages = Math.ceil(totalRows / rowsPerPage);

        let currentPage = 1;

        function renderPage(page) {
            currentPage = page;
            const start = (page - 1) * rowsPerPage;
            const end = start + rowsPerPage;

            rows.forEach((row, index) => {
                row.style.display = (index >= start && index < end) ? '' : 'none';
            });

            renderPagination();
        }

        function renderPagination() {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            const pagesToShow = Math.max(1, totalPages);
            for (let i = 1; i <= pagesToShow; i++) {
                const li = document.createElement('li');
                li.className = 'page-item ' + (i === currentPage ? 'active' : '');

                const a = document.createElement('a');
                a.className = 'page-link';
                a.href = '#';
                a.textContent = i;

                a.addEventListener('click', function (e) {
                    e.preventDefault();
                    renderPage(i);
                });

                li.appendChild(a);
                pagination.appendChild(li);
            }
        }

        if (totalRows > 0) {
            renderPage(1);
        }
    });

    const orderModal = document.getElementById('orderModal');
    orderModal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;
        const issueId = button.getAttribute('data-coupon-id');

        const tbody = document.getElementById('orderTableBody');
        tbody.innerHTML = `
            <tr>
                <td colspan="6" class="text-center text-muted">조회 중...</td>
            </tr>
        `;

        fetch(`/naeil/api/orders?issueId=${issueId}`)
            .then(response => response.json())
            .then(data => {
                // 페이징 렌더러 사용
                        renderPaginatedTable({
                    data: data || [],
                    tbodyId: 'orderTableBody',
                    paginationId: 'orderPagination',
                    pageSize: 10,
                    rowRenderer: order => {
                        return `
                            <tr class="align-middle">
                                <td class="text-secondary small text-nowrap ps-3" title="${order.uniq}">${order.uniq}</td>
                                <td class="text-nowrap">${order.customerName}</td>
                                <td class="text-start">
                                    <span class="text-resp-truncate" title="${order.shopSaleName}">${order.shopSaleName || '-'}</span>
                                </td>
                                <td class="text-nowrap fw-bold">${formatAmount(order.payAmt)}원</td>
                                <td class="text-nowrap">${formatDate(order.createDate)}</td>
                                <td class="text-nowrap">${formatDate(order.confirmDate)}</td>
                            </tr>
                        `;
                    }
                });
            })
            .catch(error => {
                console.error(error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center text-danger">
                            주문 목록 조회 중 오류가 발생했습니다.
                        </td>
                    </tr>
                `;
            });
    });


    function validateDateRange() {
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;

        // 둘 다 비어 있으면 OK
        if (!from || !to) {
            return true;
        }

        const fromDate = new Date(from);
        const toDate = new Date(to);

        if (fromDate > toDate) {
            alert('시작일은 종료일보다 늦을 수 없습니다.');
            return false;
        }

        return true;
    }
</script>
</body>
</html>
