<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: common-head('설정')}"></head>

<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/sidebar :: sidebar('settings')}"></div>

        <main class="col-md-10-5 content">

            <div class="mb-4">
                <h3>설정 관리</h3>
                <p class="text-muted mb-0">
                    쿠폰 발급 정책 및 스케줄러 설정을 관리합니다.
                </p>
            </div>

            <form id="configForm">

                <div class="card shadow-sm mb-4">

                    <div class="card-header bg-white">
                        <strong>스케줄러 설정</strong>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">
                                수집 기간
                            </label>

                            <input type="hidden" name="collect_period" id="collectPeriodFinal" th:value="${configMap['collect_period']}">

                            <div class="col-sm-2">
                                <select class="form-select" id="periodTypeSelect">
                                    <option value="now">당일</option>
                                    <option value="d">일 (Days)</option>
                                    <option value="w">주 (Weeks)</option>
                                    <option value="m">월 (Months)</option>
                                </select>
                            </div>

                            <div class="col-sm-2">
                                <input type="number"
                                       class="form-control"
                                       id="periodValueInput"
                                       placeholder="값"
                                       min="1">
                            </div>
                            <div class="col-sm-5 text-muted">
                                입력한 기간 동안의 데이터를 수집
                            </div>
                        </div>
                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">
                                실행 주기 (시간)
                            </label>
                            <div class="col-sm-4">
                                <input type="number"
                                       class="form-control"
                                       name="collect_time"
                                       th:value="${configMap['collect_time'] != null
                                                    ? #strings.replace(configMap['collect_time'], 'h', '')
                                                    : ''}"
                                       required>
                            </div>
                            <div class="col-sm-5 text-muted">
                                예) 12 → 12시간마다 실행
                            </div>
                        </div>
                    </div>

                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <strong>스탬프 적립 금액</strong>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">
                                최소 주문 금액
                            </label>
                            <div class="col-sm-4">
                                <input type="number"
                                       class="form-control"
                                       name="minimum_amount"
                                       th:value="${configMap['minimum_amount']}"
                                       min="0"
                                       required>
                            </div>
                            <div class="col-sm-5 text-muted">
                                스탬프 적립 기준이 되는 최소 주문 금액
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <strong>쿠폰 발급 설정</strong>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">
                                스탬프 개수
                            </label>
                            <div class="col-sm-4">
                                <input type="number"
                                       class="form-control"
                                       name="minimum_count"
                                       th:value="${configMap['minimum_count']}"
                                       min="0"
                                       required>
                            </div>
                            <div class="col-sm-5 text-muted">
                                쿠폰 발급 기준이 되는 최소 스탬프 개수
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <strong>쿠폰 정보</strong>
                        <button type="button"
                                class="btn btn-sm btn-outline-primary"
                                data-bs-toggle="modal"
                                data-bs-target="#couponListModal">
                            쿠폰 조회
                        </button>
                    </div>

                    <div class="card-body">
                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">
                                쿠폰 코드
                            </label>
                            <div class="col-sm-4">
                                <input type="text"
                                       class="form-control"
                                       name="imweb_coupon_code"
                                       id="couponCodeInput"
                                       th:value="${configMap['imweb_coupon_code']}"
                                       placeholder="WELCOME10">
                            </div>
                            <div class="col-sm-5 text-muted">
                                비워두면 기본값 사용
                            </div>
                        </div>
                        <div class="row">
                            <label class="col-sm-3 col-form-label">
                                쿠폰 이름
                            </label>
                            <div class="col-sm-4">
                                <input type="text"
                                       class="form-control"
                                       name="imweb_coupon_name"
                                       id="couponNameInput"
                                       th:value="${configMap['imweb_coupon_name']}"
                                       placeholder="웰컴 쿠폰">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <strong>차단 매입처 관리</strong>
                    </div>
                    <div class="card-body">
                        <input type="hidden"
                               name="blocked_suppliers"
                               id="blockedSuppliersInput"
                               th:value="${configMap['blocked_suppliers']}">

                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">매입처 키워드 추가</label>
                            <div class="col-sm-7">
                                <div class="input-group">
                                    <input type="text" class="form-control" id="keywordInput" placeholder="예) 국민돈까스">
                                    <button type="button" class="btn btn-outline-primary" id="addKeywordBtn">추가</button>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-sm-3"></div> <div class="col-sm-9">
                            <div id="blockedSupplierList" class="mb-2">
                            </div>
                            <p class="text-muted small mb-0">
                                키워드를 추가하면 해당 매입처의 주문은 제외됩니다. 삭제하려면 'x'를 클릭하세요.
                            </p>
                        </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary px-4">
                        저장
                    </button>
                </div>

            </form>

        </main>
    </div>
</div>

<div class="modal fade" id="couponListModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">쿠폰 목록</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <table class="table table-sm">
                    <thead>
                    <tr>
                        <th>쿠폰 코드</th>
                        <th>쿠폰명</th>
                        <th>상태</th>
                    </tr>
                    </thead>
                    <tbody id="couponTableBody">
                    <tr><td colspan="3" class="text-center text-muted">조회된 데이터가 없습니다.</td></tr>
                    </tbody>
                </table>
                <nav><ul class="pagination justify-content-center mt-3" id="couponPagination"></ul></nav>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ==========================================
    // 🔹 0. [신규] 수집 기간 UI 초기화 및 이벤트 로직
    // ==========================================
    const periodFinalInput = document.getElementById('collectPeriodFinal');
    const periodTypeSelect = document.getElementById('periodTypeSelect');
    const periodValueInput = document.getElementById('periodValueInput');

    // 1) 초기값 파싱 (DB값 -> UI)
    const savedPeriod = periodFinalInput.value || 'now'; // 값이 없으면 기본 'now'

    if (savedPeriod === 'now') {
        periodTypeSelect.value = 'now';
        periodValueInput.value = '';
        periodValueInput.disabled = true; // 당일은 입력 불필요
    } else {
        // 끝 글자가 d, w, m 중 하나인지 확인
        const unit = savedPeriod.slice(-1); // 마지막 글자 추출
        const number = savedPeriod.slice(0, -1); // 숫자 부분 추출

        if (['d', 'w', 'm'].includes(unit)) {
            periodTypeSelect.value = unit;
            periodValueInput.value = number;
        } else {
            // 형식이 맞지 않거나 숫자만 있는 경우 등 예외 처리 (기본 일 단위로 가정)
            periodTypeSelect.value = 'd';
            periodValueInput.value = savedPeriod;
        }
    }

    // 2) Select 변경 시 이벤트 (당일 선택 시 입력칸 비활성화)
    periodTypeSelect.addEventListener('change', function() {
        if (this.value === 'now') {
            periodValueInput.value = '';
            periodValueInput.disabled = true;
            periodValueInput.placeholder = "-";
        } else {
            periodValueInput.disabled = false;
            periodValueInput.placeholder = "값 입력";
            // 값이 비어있다면 편의상 1을 넣어줌
            if(!periodValueInput.value) periodValueInput.value = 1;
        }
    });
</script>
<script>
    // ==========================================
    // 🔹 1. 차단 매입처 관리 로직 (추가됨)
    // ==========================================
    const hiddenInput = document.getElementById('blockedSuppliersInput');
    const keywordInput = document.getElementById('keywordInput');
    const addKeywordBtn = document.getElementById('addKeywordBtn');
    const supplierListContainer = document.getElementById('blockedSupplierList');

    // 초기 데이터 로드 (DB에서 가져온 콤마 문자열 -> 배열)
    let blockedSuppliers = [];

    const rawValue = hiddenInput.value;

    // 1. 값이 있고(null/undefined 아님)
    // 2. 빈 문자열("")이 아니며
    // 3. 혹시 모를 문자열 "null"도 아닐 경우에만 split 실행
    if (rawValue && rawValue.trim().length > 0 && rawValue !== 'null') {
        blockedSuppliers = rawValue.split(',').map(s => s.trim()).filter(s => s);
    }
    // 화면 그리기 함수
    function renderBadges() {
        supplierListContainer.innerHTML = '';
        blockedSuppliers.forEach((name, index) => {
            const badge = document.createElement('span');
            badge.className = 'badge bg-light text-dark border me-1 mb-1';
            badge.style.fontSize = '0.9em';
            badge.innerHTML = `${name} <i class="bi bi-x" style="cursor:pointer; margin-left:4px;" onclick="removeSupplier(${index})">x</i>`;

            // x 버튼에 직접 이벤트 리스너를 달거나 위처럼 onclick 사용 (여기서는 편의상 onclick 문자열 주입 방식 사용하되, 함수를 전역으로 빼야 함)
            // 더 안전한 방식을 위해 아래처럼 구현
            const closeBtn = document.createElement('span');
            closeBtn.innerText = ' x';
            closeBtn.style.cursor = 'pointer';
            closeBtn.style.marginLeft = '5px';
            closeBtn.onclick = () => removeSupplier(index);

            badge.innerText = name;
            badge.appendChild(closeBtn);

            supplierListContainer.appendChild(badge);
        });

        // ⭐ 핵심: 배열을 콤마 문자열로 변환하여 Hidden Input에 저장
        hiddenInput.value = blockedSuppliers.join(',');
    }

    // 추가 함수
    function addSupplier() {
        const value = keywordInput.value.trim();
        if (!value) return;
        if (blockedSuppliers.includes(value)) {
            alert('이미 등록된 매입처입니다.');
            return;
        }
        blockedSuppliers.push(value);
        keywordInput.value = '';
        renderBadges();
    }

    // 삭제 함수
    window.removeSupplier = function(index) {
        blockedSuppliers.splice(index, 1);
        renderBadges();
    }

    // 이벤트 리스너 등록
    addKeywordBtn.addEventListener('click', addSupplier);
    keywordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault(); // 폼 제출 방지
            addSupplier();
        }
    });

    // 페이지 로드 시 초기 렌더링
    renderBadges();


    // ==========================================
    // 🔹 2. 기존 설정 저장 로직 (수정없음, Hidden Input이 자동으로 포함됨)
    // ==========================================
    document.getElementById('configForm').addEventListener('submit', function (e) {
        e.preventDefault();


        const type = periodTypeSelect.value;
        const val = periodValueInput.value;

        if (type === 'now') {
            periodFinalInput.value = 'now';
        } else {
            // 유효성 검사: 숫자가 없으면 경고
            if (!val) {
                alert("수집 기간 값을 입력해주세요.");
                periodValueInput.focus();
                return;
            }
            // 예: 숫자 '3' + 단위 'd' => '3d' 로 조합하여 Hidden Input에 저장
            periodFinalInput.value = val + type;
        }

        const configList = Array.from(
                document.querySelectorAll('#configForm input[name]')
            ).map(input => {
                let value = input.value;

                if (input.name === 'collect_time' && value) {
                    value = `${value}h`;
                }

                return {
                    configKey: input.name,
                    configValue: value
                };
            });

        // 디버깅용 로그 (개발자 도구 콘솔에서 확인 가능)
        console.log('전송 데이터:', configList);

        fetch('/naeil/api/config', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(configList)
        }).then(() => alert('저장되었습니다.'));
    });

    // ==========================================
    // 🔹 3. 쿠폰 모달 로직 (기존 동일)
    // ==========================================
    let currentCouponPage = 1;
    document.getElementById('couponListModal')
        .addEventListener('show.bs.modal', function () {
            loadCoupons(1);
        });

    function loadCoupons(page) {
        currentCouponPage = page;
        const tbody = document.getElementById('couponTableBody');
        const pagination = document.getElementById('couponPagination');

        tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">로딩 중...</td></tr>`;
        pagination.innerHTML = '';

        fetch(`/naeil/api/coupons/external?offset=${page}`)
            .then(res => res.json())
            .then(data => {
                tbody.innerHTML = '';
                if (!data.list || data.list.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">조회된 쿠폰이 없습니다.</td></tr>`;
                    return;
                }
                data.list.forEach(coupon => {
                    tbody.innerHTML += `
                        <tr class="coupon-row" style="cursor:pointer"
                            data-coupon-code="${coupon.couponCode}"
                            data-coupon-name="${coupon.name}">
                            <td>${coupon.couponCode}</td>
                            <td>${coupon.name}</td>
                            <td>${coupon.status}</td>
                        </tr>
                    `;
                });
                renderCouponPagination(data.pagenation.currentPage, data.pagenation.totalPage);
            })
            .catch((e) => {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">쿠폰 조회 중 오류가 발생했습니다.</td></tr>`;
            });
    }

    function renderCouponPagination(current, total) {
        const pagination = document.getElementById('couponPagination');
        pagination.innerHTML = '';
        if (total <= 1) return;

        pagination.innerHTML += `
            <li class="page-item ${current === 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="loadCoupons(${current - 1})"> \< </a>
            </li>
        `;
        for (let i = 1; i <= total; i++) {
            pagination.innerHTML += `
                <li class="page-item ${i === current ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="loadCoupons(${i})"> ${i} </a>
                </li>
            `;
        }
        pagination.innerHTML += `
            <li class="page-item ${current === total ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="loadCoupons(${current + 1})"> \> </a>
            </li>
        `;
    }

    document.addEventListener('click', function (e) {
        const row = e.target.closest('.coupon-row');
        if (!row) return;
        document.getElementById('couponCodeInput').value = row.dataset.couponCode;
        document.getElementById('couponNameInput').value = row.dataset.couponName;
        const modal = bootstrap.Modal.getInstance(document.getElementById('couponListModal'));
        modal.hide();
    });
</script>
</body>
</html>
