<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: common-head('설정')}"></head>

<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar('settings')}"></div>

        <!-- 🔹 Main Content -->
        <main class="col-md-10 content">

            <!-- Header -->
            <div class="mb-4">
                <h3>설정 관리</h3>
                <p class="text-muted mb-0">
                    쿠폰 발급 정책 및 스케줄러 설정을 관리합니다.
                </p>
            </div>

            <!-- 🔹 Settings Form -->
            <form id="configForm">

                <!-- 스케줄러 설정 -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <strong>스케줄러 설정</strong>
                    </div>
                    <div class="card-body">

                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">
                                실행 주기 (시간)
                            </label>
                            <div class="col-sm-4">
                                <input type="number"
                                       class="form-control"
                                       name="collect_time"
                                       th:value="${configMap['collect_time'] != null 
                                                    ? #strings.replace(configMap['collect_time'], 'h', '') 
                                                    : ''}"
                                       required>
                            </div>
                            <div class="col-sm-5 text-muted">
                                예) 12 → 12시간마다 실행
                            </div>
                        </div>

                    </div>
                </div>

                <!-- 쿠폰 발급 조건 -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <strong>쿠폰 발급 조건</strong>
                    </div>
                    <div class="card-body">

                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">
                                최소 주문 금액
                            </label>
                            <div class="col-sm-4">
                                <input type="number"
                                       class="form-control"
                                       name="minimum_amount"
                                       th:value="${configMap['minimum_amount']}"
                                       min="0"
                                       required>
                            </div>
                            <div class="col-sm-5 text-muted">
                                쿠폰 발급 대상이 되는 최소 주문 금액
                            </div>
                        </div>

                    </div>
                </div>

                <!-- 쿠폰 정보 -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <strong>쿠폰 정보</strong>
                    </div>
                    <div class="card-body">

                        <div class="row mb-3">
                            <label class="col-sm-3 col-form-label">
                                쿠폰 코드
                            </label>
                            <div class="col-sm-4">
                                <input type="text"
                                       class="form-control"
                                       name="imweb_coupon_code"
                                       th:value="${configMap['imweb_coupon_code']}"
                                       placeholder="WELCOME10">
                            </div>
                            <div class="col-sm-5 text-muted">
                                비워두면 기본값 사용
                            </div>
                        </div>

                        <div class="row">
                            <label class="col-sm-3 col-form-label">
                                쿠폰 이름
                            </label>
                            <div class="col-sm-4">
                                <input type="text"
                                       class="form-control"
                                       name="imweb_coupon_name"
                                       th:value="${configMap['imweb_coupon_name']}"
                                       placeholder="웰컴 쿠폰">
                            </div>
                            <div class="col-sm-5 text-muted">
                            </div>
                        </div>

                    </div>
                </div>

                <!-- 저장 버튼 -->
                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary px-4">
                        저장
                    </button>
                </div>

            </form>

        </main>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('configForm').addEventListener('submit', function (e) {
        e.preventDefault();

        const configList = Array.from(
                document.querySelectorAll('#configForm input[name]')
            ).map(input => {
                let value = input.value;

                if (input.name === 'collect_time' && value) {
                    value = `${value}h`;
                }

                return {
                    configKey: input.name,
                    configValue: value
                };
            });

        fetch('/naeil/api/config', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(configList)
        }).then(() => alert('저장되었습니다.'));
    });
</script>
</body>
</html>
