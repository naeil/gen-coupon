<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: common-head('주문 목록')}"></head>

<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar('orders')}"></div>

        <!-- 🔹 Main Content -->
        <main class="col-md-10-5 content">

            <!-- Header -->
            <div class="mb-4">
                <h3>주문 내역</h3>
                <p class="text-muted mb-0">
                    주문 및 스탬프 정보를 조회합니다.
                </p>
            </div>

            <!-- 🔹 Filter -->
            <form class="card shadow-sm mb-4 p-3"
                  th:action="@{/orders}"
                  method="get"
                  onsubmit="return validateDateRange();">
                <div class="mb-3">
                    <label class="form-label fw-bold mb-1">쇼핑몰</label>
                    <select class="form-select" name="shopCode" id="shopSelect" style="margin-top: 0;">
                        <option value="">전체</option>
                    </select>
                </div>
                <div class="row g-3 align-items-end">


                    <div class="col-md-3">
                        <label class="form-label fw-bold">주문자명</label>
                        <input type="text" class="form-control" name="customerName">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-bold">
                            주문일 <span class="text-muted">(시작)</span>
                        </label>
                        <input type="date" class="form-control" name="fromDate" id="fromDate">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-bold">
                            주문일 <span class="text-muted">(종료)</span>
                        </label>
                        <input type="date" class="form-control" name="toDate" id="toDate">
                    </div>

                    <div class="col-md-3">
                        <button type="submit" class="btn btn-primary w-100">
                            조회
                        </button>
                    </div>
                </div>
            </form>

            <!-- 🔹 Order Table -->
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover text-center mb-0" id="orderTable">
                        <thead class="table-light">
                            <tr>
                                <th class="text-nowrap ps-3" style="min-width: 130px;">주문번호</th>
                                <th class="text-nowrap" style="min-width: 100px;">쇼핑몰</th>
                                <th class="text-nowrap" style="min-width: 80px;">주문자</th>
                                <th class="text-nowrap" style="min-width: 300px;">상품명</th>
                                <th class="text-nowrap" style="min-width: 100px;">주문금액</th>
                                <th class="text-nowrap" style="min-width: 140px;">주문일</th>
                                <th class="text-nowrap" style="min-width: 140px;">구매 결정일</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="order, stat : ${orders}"
                                th:attr="data-index=${stat.index}">
                                <td class="ps-3 text-secondary small text-nowrap" th:text="${order.uniq}">ORD-001</td>
                                <td class="text-nowrap" th:text="${order.shopName}">1</td>
                                <td class="text-nowrap" th:text="${order.customerName}">이지형</td>
                                <td class="text-truncate text-start"
                                    th:text="${#strings.abbreviate(order.shopSaleName, 30)}"
                                    th:title="${order.shopSaleName}">상품
                                </td>
                                <td class="text-nowrap fw-bold" th:text="${#numbers.formatInteger(order.payAmt, 3, 'COMMA')} + '원'">50,000</td>
                                <td class="text-nowrap" th:text="${order.createDate == null ? '-' : #temporals.format(order.createDate, 'yyyy-MM-dd')}"></td>
                                <td class="text-nowrap" th:text="${order.confirmDate == null ? '-' : #temporals.format(order.confirmDate, 'yyyy-MM-dd')}"></td>                         
                                <!-- <td class="text-center">
                                    <button class="btn btn-sm btn-outline-secondary"
                                            data-bs-toggle="modal"
                                            data-bs-target="#orderDetailModal"
                                            th:attr="data-order-id=${order.orderHistoryId}">
                                        보기
                                    </button>
                                </td> -->
                            </tr>
                            <!-- 데이터 없을 때 -->
                            <tr th:if="${orders == null or #lists.isEmpty(orders)}">
                                <td colspan="7" class="text-center text-muted py-4">
                                    조회된 데이터가 없습니다.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    </div>
                    <div class="d-flex justify-content-center p-3 border-top">
                        <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const rows = document.querySelectorAll('#orderTable tbody tr[data-index]');
        const rowsPerPage = 20;
        const totalRows = rows.length;
        const totalPages = Math.ceil(totalRows / rowsPerPage);

        let currentPage = 1;

        function renderPage(page) {
            currentPage = page;
            const start = (page - 1) * rowsPerPage;
            const end = start + rowsPerPage;

            rows.forEach((row, index) => {
                row.style.display = (index >= start && index < end) ? '' : 'none';
            });

            renderPagination();
        }

        function renderPagination() {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            const pagesToShow = Math.max(1, totalPages);
            for (let i = 1; i <= pagesToShow; i++) {
                const li = document.createElement('li');
                li.className = 'page-item ' + (i === currentPage ? 'active' : '');

                const a = document.createElement('a');
                a.className = 'page-link';
                a.href = '#';
                a.textContent = i;

                a.addEventListener('click', function (e) {
                    e.preventDefault();
                    renderPage(i);
                });

                li.appendChild(a);
                pagination.appendChild(li);
            }
        }

        if (totalRows > 0) {
            renderPage(1);
        }
    });

    function validateDateRange() {
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;

        // 둘 다 비어 있으면 OK
        if (!from || !to) {
            return true;
        }

        const fromDate = new Date(from);
        const toDate = new Date(to);

        if (fromDate > toDate) {
            alert('시작일은 종료일보다 늦을 수 없습니다.');
            return false;
        }

        return true;
    }

    document.addEventListener('DOMContentLoaded', () => {
    fetch('/naeil/api/shops')
        .then(res => res.json())
        .then(list => {
            const select = document.getElementById('shopSelect');

            list.forEach(shop => {
                const option = document.createElement('option');
                option.value = shop.shopCode;      // ⭐ 서버로 보낼 값
                option.textContent = shop.shopName; // 화면 표시
                select.appendChild(option);
            });
        });
    });
</script>
</body>
</html>
